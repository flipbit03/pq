site_name: pq
site_description: Postgres-backed job queue for Python
site_url: https://ricwo.github.io/pq/
repo_url: https://github.com/ricwo/pq
repo_name: ricwo/pq

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.instant

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]

nav:
  - Home: index.md
  - Examples: examples.md
  - API Reference: api.md
